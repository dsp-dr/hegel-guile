name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  unit-tests:
    name: Unit Tests (Guile 3.0)
    runs-on: ubuntu-24.04

    steps:
      # Pin to commit SHAs for supply chain safety
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Guile 3.0
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q guile-3.0

      - name: Cache Guile compilation
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.cache/guile
          key: guile-ccache-${{ runner.os }}-${{ hashFiles('src/**/*.scm') }}
          restore-keys: |
            guile-ccache-${{ runner.os }}-

      - name: Detect Guile binary names
        run: |
          GUILE_BIN=$(command -v guile-3.0 2>/dev/null || command -v guile3 2>/dev/null || command -v guile 2>/dev/null || echo guile)
          GUILD_BIN=$(command -v guild-3.0 2>/dev/null || command -v guild3 2>/dev/null || command -v guild 2>/dev/null || echo guild)
          echo "GUILE=$GUILE_BIN" >> "$GITHUB_ENV"
          echo "GUILD=$GUILD_BIN" >> "$GITHUB_ENV"
          echo "Detected: GUILE=$GUILE_BIN GUILD=$GUILD_BIN"

      - name: Compile
        run: make compile

      - name: Run unit tests
        run: make test

  integration-tests:
    name: Integration Tests (hegel-core)
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    continue-on-error: true

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Guile 3.0
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q guile-3.0

      - name: Cache Guile compilation
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.cache/guile
          key: guile-ccache-${{ runner.os }}-${{ hashFiles('src/**/*.scm') }}
          restore-keys: |
            guile-ccache-${{ runner.os }}-

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install hegel-core
        run: |
          pip install uv==0.6.14
          uv tool install hegel-core==0.2.3

      - name: Detect Guile binary names
        run: |
          GUILE_BIN=$(command -v guile-3.0 2>/dev/null || command -v guile3 2>/dev/null || command -v guile 2>/dev/null || echo guile)
          GUILD_BIN=$(command -v guild-3.0 2>/dev/null || command -v guild3 2>/dev/null || command -v guild 2>/dev/null || echo guild)
          echo "GUILE=$GUILE_BIN" >> "$GITHUB_ENV"
          echo "GUILD=$GUILD_BIN" >> "$GITHUB_ENV"
          echo "Detected: GUILE=$GUILE_BIN GUILD=$GUILD_BIN"

      - name: Run unit tests
        run: make test

      - name: "E2E: basic.scm (aspirational — hangs at 200+ cases, see hegel-guile-15)"
        continue-on-error: true
        timeout-minutes: 2
        run: $GUILE -L src examples/basic.scm
